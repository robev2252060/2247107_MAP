
# =============================================================================
# Mars IoT Platform -- Nginx API Gateway
# Public port 80. All traffic routed to backend services on the internal
# mars-net Docker network.
#
# Route map:
#   /api/rules/*       -> rule-service:8003
#   /api/actuators/*   -> actuator-service:8004
#   /api/integration/* -> ms-integration:8080 (/api/v1/*)
#   /                  -> frontend:3000
# =============================================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # SSE: disable buffering for Server-Sent Events
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header X-Forwarded-Host $server_name;
    proxy_set_header X-Forwarded-Schema $scheme;

    # ---------------------------------------------------------------------------
    # Upstream definitions
    # ---------------------------------------------------------------------------

    upstream rule_service {
        server rule-service:8003;
    }

    upstream actuator_service {
        server actuator-service:8004;
    }

    upstream ms_integration_service {
        server ms-integration:8080;
    }

    upstream frontend {
        server frontend:3000;
    }

    # ---------------------------------------------------------------------------
    # Server block
    # ---------------------------------------------------------------------------

    server {
        listen 80;
        server_name _;

        # -----------------------------------------------------------------------
        # Rule service -- CRUD for automation rules
        # -----------------------------------------------------------------------
        location /api/rules/ {
            proxy_pass         http://rule_service/rules/;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffer_size 4k;
            proxy_buffers 4 4k;
            gzip off;
        }

        # -----------------------------------------------------------------------
        # Actuator service -- manual actuator control
        # -----------------------------------------------------------------------
        location = /api/actuators {
            proxy_pass         http://actuator_service/actuators/;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffer_size 4k;
            proxy_buffers 4 4k;
            gzip off;
        }

        location /api/actuators/ {
            proxy_pass         http://actuator_service/actuators/;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffer_size 4k;
            proxy_buffers 4 4k;
            gzip off;
        }

        # -----------------------------------------------------------------------
        # Integration service -- polling rate endpoints + unified sensor SSE
        # -----------------------------------------------------------------------
        location /api/integration/ {
            proxy_pass         http://ms_integration_service/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
            proxy_read_timeout 3600s;
            proxy_buffering off;
            proxy_cache off;
            gzip off;
        }

        # -----------------------------------------------------------------------
        # Frontend SPA -- catch-all, must be last
        # -----------------------------------------------------------------------
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }
    }
}

