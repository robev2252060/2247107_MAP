asyncapi: 2.6.0
info:
  title: Mars MS-Actuators AsyncAPI
  version: 1.0.0
  description: Async contracts owned by ms-actuators.

defaultContentType: application/json

servers:

  kafka:
    url: kafka:9092
    protocol: kafka
    description: Kafka broker on the Docker network.

  http:
    url: localhost:80
    protocol: http
    description: Public API gateway endpoint for SSE clients.

channels:

  actuators.automation:
    description: Automation commands consumed by ms-actuators.
    subscribe:
      summary: Consume actuator state commands from ms-automation.
      operationId: consumeAutomationCommands
      message:
        $ref: './components.asyncapi.yaml#/components/messages/ActuatorAutomationCommand'

  /api/actuators/stream:
    description: SSE stream emitted by ms-actuators.
    publish:
      summary: Push actuator state changes as MeasurementEvent frames.
      operationId: publishActuatorSseMeasurements
      message:
        $ref: './components.asyncapi.yaml#/components/messages/SseMeasurementEvent'
