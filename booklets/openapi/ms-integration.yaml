openapi: 3.0.3

info:
  title: MAP ms-integration API
  version: 1.0.0
  description: API for the Integration microservice. Publishes normalized Measurevents Events via SSE.

paths:

  /api/sensors/stream:

    get:
      summary: Stream normalized sensor events
      description: Establishes a Server-Sent Events (SSE) connection to stream continuous, batched, and homogeneous sensor events.
      responses:
        '200':
          description: SSE stream connected successfully.
          content:
            text/event-stream:
              schema:
                $ref: './components.yaml#/components/schemas/MeasurementEvent'

  /api/polling/rate:

    get:
      summary: Get global polling rate
      description: Returns the current polling interval used for legacy REST sensors (milliseconds).
      responses:
        '200':
          description: Current polling rate.
          content:
            application/json:
              schema:
                type: integer
                format: int64
    post:
      summary: Update global polling rate
      description: Updates the polling interval used for legacy REST sensors.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - rate
              properties:
                rate:
                  type: integer
                  format: int64
                  description: Polling interval in milliseconds (must be > 0).
      responses:
        '200':
          description: Polling rate updated.
        '400':
          description: Invalid polling rate supplied.
