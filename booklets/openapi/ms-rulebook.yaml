openapi: 3.0.3

info:
  title: Mars MS-Rulebook API
  version: 1.0.0
  description: API for the Rulebook Microservice. Manages CRUD for automation rules.

paths:

  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy.

  /api/rules:

    get:
      summary: List automation rules
      responses:
        '200':
          description: Rules retrieved successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './components.yaml#/components/schemas/AutomationRule'

    post:
      summary: Create a new automation rule
      description: Persists a new environmental if/then rule to the database.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components.yaml#/components/schemas/AutomationRule'
      responses:
        '201':
          description: Rule successfully created.

  /api/rules/{id}:

    get:
      summary: Get an automation rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rule retrieved successfully.
          content:
            application/json:
              schema:
                $ref: './components.yaml#/components/schemas/AutomationRule'
        '404':
          description: Rule not found.

    put:
      summary: Update an existing automation rule
      description: Modifies an existing rule (e.g., changing the threshold value or target state).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components.yaml#/components/schemas/AutomationRule'
      responses:
        '200':
          description: Rule successfully updated.
        '404':
          description: Rule not found.

    delete:
      summary: Delete an automation rule
      description: Removes an existing rule from the database.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Rule successfully deleted.
        '404':
          description: Rule not found.
