openapi: 3.0.3

info:
  title: MAP Shared Components
  version: 1.0.0
  description: Shared schema definitions for the Mars Automation Platform.

paths: { }

components:

  schemas:

    MeasurementEvent:
      type: object
      required:
        - timestamp
        - source
        - readings
      properties:
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the batch of readings was captured.
        source:
          type: string
          description: The origin sensor or actuator (e.g., 'air_quality_pm25', 'main_vent').
        status:
          type: string
          enum: [ ok, warning ]
          description: Optional overall health of the sensor during this reading.
        readings:
          type: array
          minItems: 1
          description: An array of all metrics captured at this exact timestamp or the state change.
          items:
            $ref: '#/components/schemas/Measurement'

    Measurement:
      type: object
      required:
        - metric
        - value
      properties:
        metric:
          type: string
          example: "temperature"
        value:
          description: The metric value. Can be a number for telemetry or a string for states.
          anyOf:
            - type: number
            - type: string
        unit:
          type: string
          example: "C"

    AutomationRule:
      type: object
      required:
        - sensor_source
        - sensor_metric
        - operator
        - threshold_value
        - target_actuator
        - target_state
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Unique identifier for the rule.
        sensor_source:
          type: string
          example: "greenhouse_temperature"
        sensor_metric:
          type: string
          example: "temperature_c"
        operator:
          type: string
          enum: [ '<', '<=', '=', '>', '>=' ]
          example: ">"
        threshold_value:
          type: number
          example: 28.0
        target_actuator:
          type: string
          example: "cooling_fan"
        target_state:
          type: string
          enum: [ 'ON', 'OFF' ]
          example: "ON"

    ActuatorState:
      type: object
      required:
        - actuator
        - state
      properties:
        actuator:
          type: string
          example: "cooling_fan"
        state:
          type: string
          enum: [ 'ON', 'OFF' ]
          example: "OFF"
