services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  kafka:
    image: apache/kafka:3.9.0
    container_name: mars-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9094:9094"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - mars-net
    healthcheck:
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 9092 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: mars-postgres
    environment:
      POSTGRES_USER: mars
      POSTGRES_PASSWORD: mars_secure_pass
      POSTGRES_DB: mars_iot
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./source/postgres:/docker-entrypoint-initdb.d:ro
    networks:
      - mars-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mars -d mars_iot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Simulator (do NOT modify)
  # ---------------------------------------------------------------------------

  simulator:
    image: mars-iot-simulator:multiarch_v1
    container_name: mars-simulator
    ports:
      - "8080:8080"
    networks:
      - mars-net

  # ---------------------------------------------------------------------------
  # Backend microservices
  # ---------------------------------------------------------------------------

  ms-integration:
    build:
      context: ./source/ms-integration
      dockerfile: Dockerfile
    container_name: mars-ms-integration
    environment:
      simulator.base-url: simulator:8080
      simulator.protocol: http
      server.port: 8080
      spring.kafka.bootstrap-servers: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
      simulator:
        condition: service_started
    networks:
      - mars-net
    restart: on-failure

  processing-service:
    build:
      context: ./source/processing-service
      dockerfile: Dockerfile
    container_name: mars-processing
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_GROUP_ID: processing-group
      DATABASE_URL: postgresql://mars:mars_secure_pass@postgres:5432/mars_iot
      SERVICE_PORT: "8001"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - mars-net
    restart: on-failure

  rule-service:
    build:
      context: ./source/rule-service
      dockerfile: Dockerfile
    container_name: mars-rules
    environment:
      DATABASE_URL: postgresql://mars:mars_secure_pass@postgres:5432/mars_iot
      SERVICE_PORT: "8003"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mars-net
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.connect((\"localhost\",8003)); s.close()'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  actuator-service:
    build:
      context: ./source/actuator-service
      dockerfile: Dockerfile
    container_name: mars-actuator
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_GROUP_ID: actuator-group
      SIMULATOR_BASE_URL: http://simulator:8080
      SERVICE_PORT: "8004"
    depends_on:
      kafka:
        condition: service_healthy
      simulator:
        condition: service_started
    networks:
      - mars-net
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.connect((\"localhost\",8004)); s.close()'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------

  frontend:
    build:
      context: ./source/frontend
      dockerfile: Dockerfile
    container_name: mars-frontend
    networks:
      - mars-net
    ports:
      - "3001:3000"

  # ---------------------------------------------------------------------------
  # API Gateway — single public entry point
  # ---------------------------------------------------------------------------

  nginx:
    image: nginx:1.25-alpine
    container_name: mars-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      rule-service:
        condition: service_healthy
      actuator-service:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - mars-net
    restart: unless-stopped

# =============================================================================
# Networks & Volumes
# =============================================================================

networks:
  mars-net:
    driver: bridge

volumes:
  kafka-data:
    driver: local
  postgres-data:
    driver: local
